<!DOCTYPE html>
<html lang="en" id="html-root">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#0a0a0a" />
  <title>Admin Dashboard | Michel Branche</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:ital,wght@0,400;0,700&family=Unbounded:wght@400;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    /* Stili specifici per l'admin in stile brutalist */
    body { background-color: #fce8cd; color: #0a0a0a; padding-bottom: 4rem; overflow-x: hidden; }
    .admin-container { max-width: 1000px; margin: 4rem auto; padding: 2rem; }
    .admin-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 6px solid #000; padding-bottom: 1rem; margin-bottom: 2rem; }
    .admin-header h1 { font-family: 'Bebas Neue', sans-serif; font-size: 4rem; margin: 0; text-transform: uppercase; }
    
    .login-box { max-width: 400px; margin: 8rem auto; background: #fff; border: 4px solid #000; box-shadow: 8px 8px 0 #000; padding: 2rem; }
    .login-box h2 { font-family: 'Unbounded', sans-serif; font-size: 1.5rem; margin-top: 0; text-transform: uppercase; border-bottom: 2px solid #000; padding-bottom: 0.5rem; }
    .form-group { margin-bottom: 1.5rem; }
    .form-label { display: block; font-family: 'Space Mono', monospace; font-weight: bold; margin-bottom: 0.5rem; }
    .form-input { width: 100%; border: 3px solid #000; background: #fff; color: #000; padding: 0.75rem; font-family: 'Space Mono', monospace; flex: 1; min-width: 0; font-size: 1rem; transition: transform 0.1s; box-shadow: 4px 4px 0 rgba(0,0,0,0.1); }
    .form-input:focus { outline: none; transform: translate(-2px, -2px); box-shadow: 6px 6px 0 rgba(0,0,0,0.2); }
    .form-textarea { resize: vertical; min-height: 80px; }
    .btn { background: #000; color: #fff; font-family: 'Unbounded', sans-serif; text-transform: uppercase; font-weight: bold; padding: 0.75rem 1.5rem; border: 3px solid #000; cursor: pointer; transition: all 0.2s; box-shadow: 6px 6px 0 transparent; display: inline-flex; align-items: center; justify-content: center; min-width: fit-content;}
    .btn:hover { background: #fff; color: #000; box-shadow: 6px 6px 0 #000; transform: translate(-2px, -2px); }
    .btn--danger { background: #ff3b3b; color: #fff; }
    .btn--danger:hover { background: #fff; color: #ff3b3b; box-shadow: 6px 6px 0 #ff3b3b; }
    .btn--success { background: #00d26a; color: #000; }
    .btn--success:hover { background: #fff; color: #00d26a; box-shadow: 6px 6px 0 #00d26a; }

    #dashboard { display: none; }
    .project-card { background: #fff; border: 4px solid #000; margin-bottom: 2rem; box-shadow: 8px 8px 0 #000; overflow: hidden; position: relative; }
    .project-card__header { background: #e0e0e0; border-bottom: 4px solid #000; padding: 1rem; display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: background 0.2s; }
    .project-card__header:hover { background: #d0d0d0; }
    .project-card__header h3 { font-family: 'Space Mono', monospace; font-size: 1.25rem; margin: 0; font-weight: bold; }
    .project-card__body { padding: 1.5rem; border-top: 4px solid #000; display: none; }
    .project-card.is-open .project-card__body { display: block; }
    
    .grid-2 { display: grid; grid-template-columns: 1fr; gap: 1rem; }
    @media (min-width: 768px) { .grid-2 { grid-template-columns: 1fr 1fr; gap: 2rem; } }

    .tag-container { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 0.5rem; }
    .tag { background: #000; color: #fff; padding: 0.25rem 0.5rem; font-family: 'Space Mono', monospace; font-size: 0.85rem; border: 2px solid #000; cursor: pointer; }
    .tag:hover { background: #ff3b3b; text-decoration: line-through; }
    
    .status-toast { position: fixed; bottom: 2rem; right: 2rem; background: #00d26a; color: #000; padding: 1rem 2rem; border: 4px solid #000; box-shadow: 8px 8px 0 #000; font-family: 'Unbounded', sans-serif; font-weight: bold; transform: translateY(200%); transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 9999; }
    .status-toast.show { transform: translateY(0); }
    .status-toast--error { background: #ff3b3b; color: #fff; }

    .drag-handle { cursor: grab; padding: 0 1rem; font-size: 1.5rem; user-select: none; }
    .project-card.dragging { opacity: 0.5; box-shadow: none; border-style: dashed; }
  </style>
</head>
<body class="brutalist">
  <div class="brutal-noise" aria-hidden="true"></div>

  <!-- LOGIN -->
  <div id="login-section" class="login-box">
    <h2>Admin Login</h2>
    <form id="login-form">
      <div class="form-group">
        <label class="form-label" for="password">Password (Vercel ENV):</label>
        <input type="password" id="password" class="form-input" required autofocus />
      </div>
      <button type="submit" class="btn" style="width: 100%">Entra</button>
      <p id="login-error" style="color: red; font-family: monospace; display: none; margin-top: 1rem;">Password errata. Riprova.</p>
    </form>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboard" class="admin-container">
    <div class="admin-header">
      <h1>Progetti <span id="project-count" style="font-size: 2rem; vertical-align: middle; color:#ff3b3b">(0)</span></h1>
      <div style="display:flex; gap:1rem;">
        <button id="btn-add" class="btn" type="button">+ Nuovo Progetto</button>
        <button id="btn-save" class="btn btn--success" type="button">💾 Salva Online</button>
        <button id="btn-logout" class="btn" type="button" style="background:transparent; color:#000;">Logout</button>
      </div>
    </div>
    
    <p style="font-family:'Space Mono'; margin-bottom: 2rem; font-size: 0.9rem;">Trascina le schede usando l'icona ☰ per riordinare (il primo in alto è il progetto in evidenza Featured).</p>

    <div id="projects-list">
      <!-- Progetti renderizzati qui da admin.js -->
    </div>
  </div>

  <div id="toast" class="status-toast">Salvato con successo.</div>

  <!-- Fetch initial configuration locally as fallback data -->
  <script src="data.js"></script>
  <!-- Load Admin logic -->
  <script src="admin.js"></script>
</body>
</html>
